[project]
site_name = "SynaLog"
site_description = "Logic programming for AI agents: Datalog-family language compiling to optimized SQL"
site_author = "Synalinks"
site_url = "https://synalinks.github.io/synalog/"
repo_url = "https://github.com/synalinks/synalog"
repo_name = "synalinks/synalog"
copyright = """
Copyright &copy; 2026 Synalinks
"""

extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/summarize.js", "javascripts/playground.js"]

nav = [
  { "Home" = "index.md" },
  { "Getting started" = "getting-started.md" },
  { "Playground" = "playground.md" },
  { "Language" = [
    { "Program structure" = "language/index.md" },
    { "Syntax" = "language/syntax.md" },
    { "Aggregation" = "language/aggregation.md" },
    { "Directives" = "language/directives.md" },
    { "Built-in functions" = "language/functions.md" },
    { "Functors" = "language/functors.md" },
    { "Recursion" = "language/recursion.md" },
    { "Temporal data" = "language/temporal.md" },
  ] },
  { "Knowledge graphs" = "knowledge-graphs.md" },
  { "Ontologies" = "ontologies.md" },
  { "Python API" = "python-api.md" },
  { "CLI interface" = "cli.md" },
  { "Verification" = "verification.md" },
  { "Supported engines" = "engines.md" },
  { "Benchmark" = "benchmark.md" },
  { "Differences with Datalog" = "differences-datalog.md" },
  { "Differences with Logica" = "differences.md" },
  { "Development" = "development.md" },
]

[project.theme]
language = "en"
logo = "assets/synalog-light.svg"
favicon = "assets/synalog_favicon.png"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/synalinks/synalog"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/synalog/"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
